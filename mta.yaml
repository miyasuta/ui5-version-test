_schema-version: "3.2"
ID: ui5-version-test
version: 0.0.1
modules:
- name: ui5-version-test-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ui5-version-test-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - noversion.zip
      name: noversion
      target-path: resources/
    - artifacts:
      - version136.zip
      name: version136
      target-path: resources/
    - artifacts:
      - version145.zip
      name: version145
      target-path: resources/
- name: noversion
  type: html5
  path: noversion
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: version136
  type: html5
  path: version136
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: version145
  type: html5
  path: version145
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ui5-version-test-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ui5-version-test-html5-service
    service-plan: app-host
- name: ui5-version-test-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ui5-version-test-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
